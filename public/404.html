<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>COREXIA-Link</title>
  <script type="text/javascript">
    // Single Page Apps for GitHub Pages - SPA redirect trick
    // When GitHub Pages returns 404 for a deep link, this page encodes the
    // path into a query string and redirects to index.html which decodes it.
    var pathSegmentsToKeep = 1; // keep /corexialink prefix
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
